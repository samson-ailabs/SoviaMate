task:
  _target_: soviamate.tasks.restoration.AudioCodecTask

  data:
    tokenizer: &tokenizer
      _target_: soviamate.datas.tokenizer.Tokenizer
      model_name: gpt-4o

    trainset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths: /data/Emilia-Dataset/trainset-english.jsonl
      tokenizer: *tokenizer

      # transforms:
      #   audio:
      #     shifter:
      #       _target_: soviamate.datas.transform.PitchShift
      #       min_pitch_rate: 0.7
      #       max_pitch_rate: 1.3
      #       probability: 1.0

      #   prompt:
      #     trimmer:
      #       _target_: soviamate.datas.transform.AudioTrimmer
      #       percentage: 0.3
      #       min_duration: 0.7
      #       probability: 1.0

      #     stretcher:
      #       _target_: soviamate.datas.transform.TimeStretch
      #       min_speed_rate: 0.5
      #       max_speed_rate: 1.5
      #       probability: 1.0

    valset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths: /data/Emilia-Dataset/valset-english.jsonl
      tokenizer: *tokenizer

    loader:
      batch_size: 8
      num_workers: 4
      pin_memory: true

  model:
    d_model: &d_model 1024
    window_size: &window_size 640
    contexts: &contexts [[4, 16], [8, 32], [16, 64]]

    audio_encoder:
      _target_: soviamate.modules.encoder.AudioEncoder
      window_size: *window_size
      num_layers: 16
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 31
      dropout: 0.1
      contexts: *contexts

    audio_decoder:
      _target_: soviamate.modules.decoder.AudioDecoder
      window_size: *window_size
      num_layers: 8
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 31 
      dropout: 0.1
      contexts: *contexts

    audio_quantizer:
      _target_: soviamate.modules.quantizer.FiniteScalarQuantization
      input_dim: *d_model
      levels: [31, 29, 23, 19, 17, 13]
      num_codebooks: 1
      noise_dropout: 0.5

    discriminator:
      _target_: soviamate.modules.discriminator.SpecUnetDisc
      n_ffts: [512, 1024, 2048]
      win_lengths: [256, 512, 1024]
      hop_lengths: [128, 256, 512]

    audio_loss:
      _target_: soviamate.modules.criterion.MultiResolutionMelLoss
      sample_rate: 16000
      window_lengths: [32, 64, 128, 256, 512, 1024, 2048]
      hop_lengths: [8, 16, 32, 64, 128, 256, 512]
      mel_bins: [5, 10, 20, 40, 80, 160, 320]
      weighted_losses: [5, 6, 7, 8, 9, 10, 11]

    adv_loss:
      _target_: soviamate.modules.criterion.LeastSquaresGANLoss

    fmap_loss:
      _target_: soviamate.modules.criterion.FeatureMatchingLoss

  optim:
    generator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 0.3
        betas: [0.9, 0.95]
        weight_decay: 1e-2
        fused: true

      scheduler:
        _target_: soviamate.optims.lr_scheduler.NoamAnnealing
        d_model: *d_model
        warmup_steps: 10000

    discriminator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 1e-4
        betas: [0.5, 0.9]
        weight_decay: 1e-5
        fused: true

      scheduler:
        _target_: torch.optim.lr_scheduler.ExponentialLR
        gamma: 0.95

callbacks:
  lr:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor

  cb:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    monitor: train_loss
    save_top_k: 10
    save_last: true
    save_weights_only: true
    filename: "{epoch}-{step}-{train_loss:.5f}"
    every_n_train_steps: 100000

loggers:
  tb:
    _target_: lightning.pytorch.loggers.TensorBoardLogger
    save_dir: lightning_logs
    name: audio_codec
    version: null
    default_hp_metric: false

trainer:
  devices: 8
  accelerator: gpu
  precision: bf16-mixed
  strategy: ddp_find_unused_parameters_true
  max_epochs: 10
  val_check_interval: 100000

