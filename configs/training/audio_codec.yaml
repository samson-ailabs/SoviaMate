task:
  _target_: soviamate.tasks.conversion.AudioCodecTask

  data:
    tokenizer: &tokenizer
      _target_: soviamate.datas.tokenizer.SentencePieceTokenizer
      model_path: tokenizers/emilia_libri_tokenizer.model
      vocab_size: &vocab_size 1025  # 1024 BPE tokens + 1 blank token (index 0)
      character_coverage: 0.9995
      model_type: bpe

    trainset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths:
        - /data/Emilia-Dataset/trainset-english.jsonl
        - /data/Libri-Heavy/trainset.jsonl
      tokenizer: *tokenizer

      transforms:
        content:
          perturb:
            _target_: soviamate.datas.transform.SpeakerPerturbation
            min_formant_factor: 0.8
            max_formant_factor: 1.2
            probability: 1.0

        speaker:
          trimmer:
            _target_: soviamate.datas.transform.AudioTrimmer
            percentage: 0.3
            min_duration: 0.7
            probability: 1.0

    valset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths:
        - /data/Emilia-Dataset/valset-english.jsonl
        - /data/Libri-Heavy/valset.jsonl
      tokenizer: *tokenizer

    loader:
      batch_size: 16
      num_workers: 8
      pin_memory: true

  model:
    d_model: &d_model 1024

    frame_stacking: &frame_stacking 4
    window_length: &window_length 400
    hop_length: &hop_length 160

    dynamic_chunk_sizes: &dynamic_chunk_sizes [4, 8, 12, 16]
    full_context_prob: &full_context_prob 0.2

    audio_encoder:
      _target_: soviamate.modules.encoder.AudioEncoder
      frame_stacking: *frame_stacking
      window_length: *window_length
      hop_length: *hop_length
      num_layers: 4
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 9
      dropout: 0.1
      dynamic_chunk_sizes: *dynamic_chunk_sizes
      full_context_prob: *full_context_prob

    spec_augment:
      _target_: soviamate.layers.processor.SpecAugmentProcessor
      time_mask_param: 0.05
      freq_mask_param: 0.0
      num_time_masks: 5
      num_freq_masks: 0
      mask_value: 0.0

    text_decoder:
      _target_: soviamate.modules.decoder.TextDecoder
      output_dim: *vocab_size
      num_layers: 2
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 9
      dropout: 0.1
      dynamic_chunk_sizes: *dynamic_chunk_sizes
      full_context_prob: *full_context_prob

    audio_decoder:
      _target_: soviamate.modules.decoder.AudioDecoder
      frame_stacking: *frame_stacking
      window_length: *window_length
      hop_length: *hop_length
      num_layers: 4
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 9
      dropout: 0.1
      dynamic_chunk_sizes: *dynamic_chunk_sizes
      full_context_prob: *full_context_prob

    audio_quantizer:
      _target_: soviamate.modules.quantizer.FiniteScalarQuantizer
      input_dim: *d_model
      fsq_levels: [16, 16, 16, 16, 16, 16, 16, 16]
      noise_dropout: 0.5

    speaker_adapter:
      _target_: soviamate.modules.adapter.SpeakerAdapter
      model_name: WAVLM_LARGE
      extract_layer: 4
      output_dim: *speaker_dim
      dropout: 0.1

    discriminator:
      _target_: soviamate.modules.discriminator.MultiSpectroStreamDiscriminators
      n_ffts: [128, 256, 512, 1024, 2048, 4096]
      hop_lengths: [64, 128, 256, 512, 1024, 2048]

    audio_loss:
      _target_: soviamate.modules.criterion.MelSpectralEnergyDistanceLoss
      sample_rate: 16000
      window_sizes: [64, 128, 256, 512, 1024, 2048]
      mel_bins: [10, 20, 40, 80, 160, 320]

    adv_loss:
      _target_: soviamate.modules.criterion.HingeAdversarialLoss

    text_loss:
      _target_: soviamate.modules.criterion.SequenceToSequenceLoss
      zero_infinity: true

    speaker_loss:
      _target_: soviamate.modules.criterion.SequenceContrastiveLoss
      num_samples: 1024
      lambda_inv: 5.0
      lambda_var: 1.0
      lambda_cov: 1.0

  optim:
    total_steps: &total_steps 800000 
    pct_start: &pct_start 0.01

    generator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 1.0
        betas: [0.8, 0.99]
        fused: true

      scheduler:
        _target_: torch.optim.lr_scheduler.OneCycleLR
        max_lr: 1e-5
        total_steps: *total_steps
        pct_start: *pct_start
        div_factor: 100
        final_div_factor: 1000

    discriminator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 1.0
        betas: [0.8, 0.99]
        fused: true

      scheduler:
        _target_: torch.optim.lr_scheduler.OneCycleLR
        max_lr: 1e-5
        total_steps: *total_steps
        pct_start: *pct_start
        div_factor: 100
        final_div_factor: 1000

callbacks:
  lr:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor

  cb:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    filename: "{epoch}-{step}-{val_loss:.5f}"
    monitor: val_loss
    save_top_k: 10
    save_last: true
    every_n_train_steps: 100000

loggers:
  tb:
    _target_: lightning.pytorch.loggers.TensorBoardLogger
    save_dir: lightning_logs
    name: emilia_libri_codec
    version: null
    default_hp_metric: false

trainer:
  devices: 8
  accelerator: gpu
  precision: bf16-mixed
  strategy: ddp_find_unused_parameters_true
  max_epochs: 2
  val_check_interval: 50000
