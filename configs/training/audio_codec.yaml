task:
  _target_: soviamate.tasks.restoration.AudioCodecTask

  data:
    tokenizer: &tokenizer
      _target_: soviamate.datas.tokenizer.SentencePieceTokenizer
      model_path: models/asr_tokenizer_8k.model
      vocab_size: 8000
      character_coverage: 1.0
      model_type: bpe

    trainset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths: /data/Emilia-Dataset/trainset-english.jsonl
      tokenizer: *tokenizer

      # transforms:
      #   audio:
      #     shifter:
      #       _target_: soviamate.datas.transform.PitchShift
      #       min_pitch_rate: 0.7
      #       max_pitch_rate: 1.3
      #       probability: 1.0

      #   prompt:
      #     trimmer:
      #       _target_: soviamate.datas.transform.AudioTrimmer
      #       percentage: 0.3
      #       min_duration: 0.7
      #       probability: 1.0

      #     stretcher:
      #       _target_: soviamate.datas.transform.TimeStretch
      #       min_speed_rate: 0.5
      #       max_speed_rate: 1.5
      #       probability: 1.0

    valset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths: /data/Emilia-Dataset/valset-english.jsonl
      tokenizer: *tokenizer

    loader:
      batch_size: 16
      num_workers: 8
      pin_memory: true

  model:
    d_model: &d_model 1024
    window_size: &window_size 640
    contexts: &contexts [[4, 16], [8, 32], [16, 64]]
    vocab_size: &vocab_size 8000

    audio_encoder:
      _target_: soviamate.modules.encoder.AudioEncoder
      window_size: *window_size
      num_layers: 8
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 31
      dropout: 0.1
      contexts: *contexts

    # # ASR Module: Text decoder for transcription before quantization
    # text_decoder:
    #   _target_: soviamate.modules.decoder.TextDecoder
    #   input_dim: *d_model
    #   hidden_dim: 2048
    #   output_dim: *vocab_size
    #   dropout: 0.1

    # # Speaker adaptation components
    # speaker_encoder:
    #   _target_: soviamate.modules.encoder.SpeakerEncoder
    #   sample_rate: 16000
    #   n_fft: 1024
    #   win_length: 1024
    #   hop_length: 256
    #   num_channels: 64
    #   num_frequencies: 80
    #   pooling_dim: 128
    #   output_dim: *d_model

    # speaker_adapter:
    #   _target_: soviamate.modules.adapter.SpeakerAdapter
    #   input_dim: *d_model
    #   hidden_dim: 2048
    #   num_heads: 8
    #   dropout: 0.1

    audio_decoder:
      _target_: soviamate.modules.decoder.AudioDecoder
      window_size: *window_size
      num_layers: 4
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 31 
      dropout: 0.1
      contexts: *contexts

    audio_quantizer:
      _target_: soviamate.modules.quantizer.FiniteScalarQuantization
      input_dim: *d_model
      levels: [31, 29, 23, 19, 17, 13]
      num_codebooks: 1
      noise_dropout: 0.5

    discriminator:
      _target_: soviamate.modules.discriminator.MultiSpectroStreamDiscriminator
      n_ffts: [128, 256, 512, 1024, 2048, 4096]
      hop_lengths: [64, 128, 256, 512, 1024, 2048]
      win_lengths: [128, 256, 512, 1024, 2048, 4096]

    audio_loss:
      _target_: soviamate.modules.criterion.MelSpectralEnergyLoss
      sample_rate: 16000
      fft_sizes: [64, 128, 256, 512, 1024, 2048]
      mel_bins: [8, 16, 32, 64, 128, 256]

    adv_loss:
      _target_: soviamate.modules.criterion.LeastSquaresGANLoss

    # # ASR Loss: Sequence-to-sequence loss combining CTC and RNN-T
    # text_loss:
    #   _target_: soviamate.modules.criterion.SequenceToSequenceLoss
    #   embedding_dim: 512
    #   encoder_dim: *d_model
    #   predictor_dim: 512
    #   joint_dim: 512
    #   context_size: 8
    #   vocab_size: *vocab_size
    #   dropout: 0.1
    #   num_samples: 1024

  optim:
    total_steps: &total_steps 1171875  # (50M samples / (16 batch_size * 8 devices)) * 3 epochs
    warmup_steps: &warmup_steps 23438  # 2% of total steps for linear warmup (1171875 * 0.02)
    T_max: &T_max 1148437  # total_steps - warmup_steps (1171875 - 23438)
    eta_min: &eta_min 1e-6  # Minimum learning rate for cosine annealing

    generator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 3e-5
        betas: [0.9, 0.95]
        fused: true

      scheduler:
        # Cosine annealing with linear warmup using SequentialLR
        _target_: torch.optim.lr_scheduler.SequentialLR
        schedulers:
          - _target_: torch.optim.lr_scheduler.LinearLR
            start_factor: 1e-8
            total_iters: *warmup_steps
          - _target_: torch.optim.lr_scheduler.CosineAnnealingLR
            T_max: *T_max
            eta_min: *eta_min
        milestones: [*warmup_steps]

    discriminator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 3e-5
        betas: [0.9, 0.95]
        fused: true

      scheduler:
        # Cosine annealing with linear warmup using SequentialLR
        _target_: torch.optim.lr_scheduler.SequentialLR
        schedulers:
          - _target_: torch.optim.lr_scheduler.LinearLR
            start_factor: 1e-8
            total_iters: *warmup_steps
          - _target_: torch.optim.lr_scheduler.CosineAnnealingLR
            T_max: *T_max
            eta_min: *eta_min
        milestones: [*warmup_steps]

callbacks:
  lr:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor

  cb:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    filename: "{epoch}-{step}-{val_loss:.5f}"
    monitor: val_loss
    save_top_k: 10
    save_last: true
    every_n_train_steps: 200000

loggers:
  tb:
    _target_: lightning.pytorch.loggers.TensorBoardLogger
    save_dir: lightning_logs
    name: audio_codec
    version: null
    default_hp_metric: false

trainer:
  devices: 8
  accelerator: gpu
  precision: bf16-mixed
  strategy: ddp_find_unused_parameters_true
  max_epochs: 3
  val_check_interval: 99999
