task:
  _target_: soviamate.tasks.conversion.AudioCodecTask

  data:
    tokenizer: &tokenizer
      _target_: soviamate.datas.tokenizer.SentencePieceTokenizer
      model_path: models/mls_english_tokenizer.model
      vocab_size: &vocab_size 1025  # 1024 BPE tokens + 1 blank token (index 0)
      character_coverage: 0.9995
      model_type: bpe

    trainset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths: /data/MLS-English/trainset.jsonl
      tokenizer: *tokenizer

      transforms:
        content:
          perturb:
            _target_: soviamate.datas.transform.SpeakerPerturbation
            min_formant_factor: 0.8
            max_formant_factor: 1.2
            probability: 1.0

        speaker:
          trimmer:
            _target_: soviamate.datas.transform.AudioTrimmer
            percentage: 0.3
            min_duration: 0.7
            probability: 1.0

    valset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths: /data/MLS-English/valset.jsonl
      tokenizer: *tokenizer

    loader:
      batch_size: 16
      num_workers: 8
      pin_memory: true

  model:
    d_model: &d_model 1024
    window_size: &window_size 640
    dynamic_chunk_sizes: &dynamic_chunk_sizes [4, 8, 12, 16]
    full_context_prob: &full_context_prob 0.2

    audio_encoder:
      _target_: soviamate.modules.encoder.AudioEncoder
      window_size: *window_size
      num_layers: 4
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 9
      dropout: 0.1
      dynamic_chunk_sizes: *dynamic_chunk_sizes
      full_context_prob: *full_context_prob

    spec_augment:
      _target_: soviamate.layers.processor.SpecAugmentProcessor
      time_mask_param: 0.05
      freq_mask_param: 0.0
      num_time_masks: 5
      num_freq_masks: 0
      mask_value: 0.0

    text_decoder:
      _target_: soviamate.modules.decoder.TextDecoder
      output_dim: *vocab_size
      num_layers: 2
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 9
      dropout: 0.1
      dynamic_chunk_sizes: *dynamic_chunk_sizes
      full_context_prob: *full_context_prob

    audio_decoder:
      _target_: soviamate.modules.decoder.AudioDecoder
      window_size: *window_size
      num_layers: 4
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 9
      dropout: 0.1
      use_cross_attn: true
      cross_attn_dim: &speaker_dim 256
      dynamic_chunk_sizes: *dynamic_chunk_sizes
      full_context_prob: *full_context_prob

    audio_quantizer:
      _target_: soviamate.modules.quantizer.FiniteScalarQuantizer
      input_dim: *d_model
      fsq_levels: [8, 8, 8, 5, 5, 5]
      noise_dropout: 0.5

    speaker_adapter:
      _target_: soviamate.modules.adapter.SpeakerAdapter
      model_name: WAVLM_LARGE
      extract_layer: 4
      output_dim: *speaker_dim
      dropout: 0.1

    discriminator:
      _target_: soviamate.modules.discriminator.MultiSpectroStreamDiscriminator
      n_ffts: [128, 256, 512, 1024, 2048, 4096]
      hop_lengths: [64, 128, 256, 512, 1024, 2048]
      win_lengths: [128, 256, 512, 1024, 2048, 4096]

    audio_loss:
      _target_: soviamate.modules.criterion.MelSpectralEnergyLoss
      sample_rate: 16000
      fft_sizes: [64, 128, 256, 512, 1024, 2048]
      mel_bins: [8, 16, 32, 64, 128, 256]

    adv_loss:
      _target_: soviamate.modules.criterion.LeastSquaresGANLoss

    text_loss:
      _target_: soviamate.modules.criterion.SequenceToSequenceLoss
      zero_infinity: true

    speaker_loss:
      _target_: soviamate.modules.criterion.SequenceContrastiveLoss
      num_samples: 1024
      lambda_inv: 5.0
      lambda_var: 1.0
      lambda_cov: 1.0

  optim:
    total_steps: &total_steps 800000  # (1.024M samples / (16 batch size * 8 gpus) * 10 epochs)
    pct_start: &pct_start 0.01  # 0.01 * 800,000 = 8,000 steps for warmup

    generator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 1.0
        betas: [0.9, 0.95]
        fused: true

      scheduler:
        _target_: torch.optim.lr_scheduler.OneCycleLR
        max_lr: 3e-5
        total_steps: *total_steps
        pct_start: *pct_start
        div_factor: 100
        final_div_factor: 1000

    discriminator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 1.0
        betas: [0.9, 0.95]
        fused: true

      scheduler:
        _target_: torch.optim.lr_scheduler.OneCycleLR
        max_lr: 3e-5
        total_steps: *total_steps
        pct_start: *pct_start
        div_factor: 100
        final_div_factor: 1000

callbacks:
  lr:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor

  cb:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    filename: "{epoch}-{step}-{val_loss:.5f}"
    monitor: val_loss
    save_top_k: 10
    save_last: true
    every_n_train_steps: 80000

loggers:
  tb:
    _target_: lightning.pytorch.loggers.TensorBoardLogger
    save_dir: lightning_logs
    name: audio_codec_mls
    version: null
    default_hp_metric: false

trainer:
  devices: 8
  accelerator: gpu
  precision: bf16-mixed
  strategy: ddp_find_unused_parameters_true
  max_epochs: 10
  val_check_interval: 39999
