task:
  _target_: soviamate.tasks.restoration.AudioCodecTask

  data:
    tokenizer: &tokenizer
      _target_: soviamate.datas.tokenizer.SentencePieceTokenizer
      model_path: models/asr_tokenizer.model
      vocab_size: &vocab_size 1025  # 1024 BPE tokens + 1 blank token (index 0)
      character_coverage: 0.9995
      model_type: bpe

    trainset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths: /data/Emilia-Dataset/sub-trainset-english.jsonl
      tokenizer: *tokenizer

      # transforms:
      #   audio:
      #     shifter:
      #       _target_: soviamate.datas.transform.PitchShift
      #       min_pitch_rate: 0.7
      #       max_pitch_rate: 1.3
      #       probability: 1.0

      #   prompt:
      #     trimmer:
      #       _target_: soviamate.datas.transform.AudioTrimmer
      #       percentage: 0.3
      #       min_duration: 0.7
      #       probability: 1.0

      #     stretcher:
      #       _target_: soviamate.datas.transform.TimeStretch
      #       min_speed_rate: 0.5
      #       max_speed_rate: 1.5
      #       probability: 1.0

    valset:
      _target_: soviamate.datas.dataset.AudioCodecDataset
      filepaths: /data/Emilia-Dataset/sub-valset-english.jsonl
      tokenizer: *tokenizer

    loader:
      batch_size: 16
      num_workers: 8
      pin_memory: true

  model:
    d_model: &d_model 1024
    window_size: &window_size 640
    contexts: &contexts [[4, 16], [8, 32], [16, 64]]
    vocab_size: *vocab_size

    audio_encoder:
      _target_: soviamate.modules.encoder.AudioEncoder
      window_size: *window_size
      num_layers: 8
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 31
      dropout: 0.1
      contexts: *contexts

    spec_augment:
      _target_: soviamate.layers.processor.SpecAugmentProcessor
      time_mask_param: 0.05
      freq_mask_param: 0.0
      num_time_masks: 5
      num_freq_masks: 0
      mask_value: 0.0

    text_decoder:
      _target_: soviamate.modules.decoder.TextDecoder
      output_dim: *vocab_size
      num_layers: 2
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 31
      dropout: 0.1
      contexts: *contexts

    # speaker_adapter:
    #   _target_: soviamate.modules.adapter.SpeakerAdapter
    #   input_dim: *d_model
    #   sample_rate: 16000
    #   n_fft: 512
    #   win_length: 400
    #   hop_length: 160
    #   num_mels: 80
    #   encoder_hidden_dim: 256
    #   encoder_ffn_expansion: 4
    #   encoder_blocks_per_stage: [2, 2, 2, 2]
    #   encoder_kernel_sizes: [5, 9, 11, 11]
    #   fusion_ffn_dim: 4096
    #   fusion_num_heads: 8
    #   fusion_strategy: hybrid
    #   dropout: 0.1

    audio_decoder:
      _target_: soviamate.modules.decoder.AudioDecoder
      window_size: *window_size
      num_layers: 4
      d_model: *d_model
      ffn_dim: 4096
      num_heads: 8
      kernel_size: 31
      dropout: 0.1
      contexts: *contexts

    audio_quantizer:
      _target_: soviamate.modules.quantizer.FiniteScalarQuantization
      input_dim: *d_model
      levels: [31, 29, 23, 19, 17, 13]
      num_codebooks: 1
      noise_dropout: 0.5

    discriminator:
      _target_: soviamate.modules.discriminator.MultiSpectroStreamDiscriminator
      n_ffts: [128, 256, 512, 1024, 2048, 4096]
      hop_lengths: [64, 128, 256, 512, 1024, 2048]
      win_lengths: [128, 256, 512, 1024, 2048, 4096]

    audio_loss:
      _target_: soviamate.modules.criterion.MelSpectralEnergyLoss
      sample_rate: 16000
      fft_sizes: [64, 128, 256, 512, 1024, 2048]
      mel_bins: [8, 16, 32, 64, 128, 256]

    adv_loss:
      _target_: soviamate.modules.criterion.LeastSquaresGANLoss

    text_loss:
      _target_: soviamate.modules.criterion.SequenceToSequenceLoss
      zero_infinity: true

  optim:
    total_steps: &total_steps 1000000  # (32M samples / (16 batch size * 8 gpus) * 4 epochs)
    pct_start: &pct_start 0.01  # 0.01 * 1,000,000 = 10,000 steps for warmup

    generator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 1.0
        betas: [0.9, 0.95]
        fused: true

      scheduler:
        _target_: torch.optim.lr_scheduler.OneCycleLR
        max_lr: 3e-5
        total_steps: *total_steps
        pct_start: *pct_start
        div_factor: 100
        final_div_factor: 1000

    discriminator:
      optimizer:
        _target_: torch.optim.AdamW
        lr: 1.0
        betas: [0.9, 0.95]
        fused: true

      scheduler:
        _target_: torch.optim.lr_scheduler.OneCycleLR
        max_lr: 3e-5
        total_steps: *total_steps
        pct_start: *pct_start
        div_factor: 100
        final_div_factor: 1000

callbacks:
  lr:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor

  cb:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    filename: "{epoch}-{step}-{val_loss:.5f}"
    monitor: val_loss
    save_top_k: 10
    save_last: true
    every_n_train_steps: 100000

loggers:
  tb:
    _target_: lightning.pytorch.loggers.TensorBoardLogger
    save_dir: lightning_logs
    name: audio_codec
    version: null
    default_hp_metric: false

trainer:
  devices: 8
  accelerator: gpu
  precision: bf16-mixed
  strategy: ddp_find_unused_parameters_true
  max_epochs: 4
  val_check_interval: 49999
