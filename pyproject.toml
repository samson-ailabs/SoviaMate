[project]
name = "soviamate"
version = "0.1.0"
description = "SoviaMate - a framework for Conversational AI"
authors = [{ name = "Samson", email = "samson-voice@gmail.com" }]
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
dependencies = [
    "hydra-core>=1.3.2",
    "lightning>=2.5.2",
    "tiktoken>=0.9.0",
    "torch>=2.7.1",
    "torchaudio>=2.7.1",
]

[dependency-groups]
dev = [
    "ipython>=9.4.0",
    "tensorboard>=2.20.0",
]
